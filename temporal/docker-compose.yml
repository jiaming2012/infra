# =============================================================================
# Temporal Stack — Docker Compose
# =============================================================================
# Services: Temporal server (auto-setup), Web UI, Admin Tools
# Persistence: External PostgreSQL (Metabase's Postgres on WSL host)
# Network: Isolated bridge network — temporal-net
# =============================================================================
# NOTE: No 'version:' key — deprecated in Compose Spec (modern Docker Compose
#       ignores it; omitting follows current best practice)
# =============================================================================

x-restart: &restart-policy
  restart: always

networks:
  temporal-net:
    driver: bridge

volumes:
  temporal-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # Temporal Server (auto-setup)
  # Handles schema init for both 'temporal' and 'temporal_visibility' databases
  # on first run, then starts all four internal services (Frontend, History,
  # Matching, Worker) in a single container.
  #
  # Connects to EXTERNAL Postgres on the WSL host via host-gateway.
  # Requires POSTGRES_HOST, POSTGRES_USER, POSTGRES_PASSWORD in .env
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.29.5
    <<: *restart-policy
    container_name: temporal
    environment:
      # Use postgres12 driver (NOT 'postgres' — retired in Temporal v1.24)
      - DB=postgres12
      - DB_PORT=${POSTGRES_PORT:-5432}
      # POSTGRES_SEEDS = hostname/IP reachable from inside the container
      # Set POSTGRES_HOST=host-gateway in .env (see .env.example)
      - POSTGRES_SEEDS=${POSTGRES_HOST:?Set POSTGRES_HOST in .env}
      - POSTGRES_USER=${POSTGRES_USER:?Set POSTGRES_USER in .env}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
      # Bind gRPC on all interfaces so remote workers can connect
      - BIND_ON_IP=0.0.0.0
      # Advertised address for worker task-routing RPCs (must be the host LAN IP,
      # not 0.0.0.0 or a container IP — see Phase 2 research, Pitfall 1)
      - TEMPORAL_BROADCAST_ADDRESS=${TEMPORAL_BROADCAST_ADDRESS:-192.168.8.164}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      # Prometheus metrics endpoint — enables /metrics on port 8000 inside the container.
      # Prometheus scrapes this via Docker DNS (temporal:8000). Port 8000 is NOT published
      # to the host — only accessible within temporal-net.
      - PROMETHEUS_ENDPOINT=0.0.0.0:8000
    volumes:
      # Mount dynamic config directory (required — server fails without it)
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      # gRPC port — 0.0.0.0 allows workers from outside the WSL box to connect
      - "0.0.0.0:7233:7233"
    extra_hosts:
      # host-gateway resolves to the Docker host's bridge IP (Docker 20.10+)
      # Allows using POSTGRES_HOST=host-gateway in .env for WSL host Postgres
      - "host-gateway:host-gateway"
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - temporal-net

  # ---------------------------------------------------------------------------
  # Temporal Web UI
  # Accessible from Windows browser via Docker Desktop port forwarding.
  # IMPORTANT: Must bind on 0.0.0.0 (not 127.0.0.1) — Docker Desktop only
  # forwards 0.0.0.0-bound ports from WSL2 to the Windows localhost.
  # URL: http://localhost:8233
  # ---------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.48.1
    <<: *restart-policy
    container_name: temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8233
      - TEMPORAL_PERMIT_WRITE_API=true
    ports:
      # 0.0.0.0 required for Docker Desktop to forward to Windows browser
      - "0.0.0.0:8233:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - temporal-net

  # ---------------------------------------------------------------------------
  # Temporal Admin Tools
  # Provides the 'temporal' CLI for namespace management and one-off operations.
  # Not always-on — no restart policy. Access via:
  #   docker compose run --rm temporal-admin-tools temporal <command>
  #   docker compose exec temporal-admin-tools temporal operator namespace list
  # ---------------------------------------------------------------------------
  temporal-admin-tools:
    image: temporalio/admin-tools:1.29.5-tctl-v1.18.4-cli-v1.6.1
    container_name: temporal-admin-tools
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - temporal-net

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Scraping
  # Scrapes Temporal /metrics endpoint at temporal:8000 on temporal-net.
  # Data persisted in prometheus-data volume with 15-day retention.
  # UI: http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.5
    <<: *restart-policy
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "0.0.0.0:9090:9090"
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - temporal-net

  # ---------------------------------------------------------------------------
  # Grafana — Metrics Dashboards
  # Pre-provisioned with Prometheus datasource and Temporal server dashboard.
  # Login: admin / (GRAFANA_ADMIN_PASSWORD from .env, default: admin)
  # UI: http://localhost:3000
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:12.4.2
    <<: *restart-policy
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - temporal-net

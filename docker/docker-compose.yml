version: "3.9"

# =============================================================================
# Trading Stack — Docker Compose
# =============================================================================
# Services: Go trading server, PostgreSQL, EventStoreDB, Python bots
# Process management: Docker restart policies replace PM2 entirely
# =============================================================================

x-restart: &restart-policy
  restart: always

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *restart-policy
    container_name: trading-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
      # S3 credentials for WAL archiving (used by wal-archive.sh)
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-trading-wal-backups}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/wal-archive.sh:/usr/local/bin/wal-archive.sh:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "127.0.0.1:5432:5432"   # Only accessible from localhost (not exposed to internet)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-net

  # ---------------------------------------------------------------------------
  # EventStoreDB 24.x (event sourcing)
  # ---------------------------------------------------------------------------
  eventstoredb:
    image: eventstore/eventstore:24.2-bookworm-slim
    <<: *restart-policy
    container_name: trading-eventstore
    environment:
      # Single-node mode (no cluster)
      EVENTSTORE_CLUSTER_SIZE: 1
      EVENTSTORE_RUN_PROJECTIONS: All
      EVENTSTORE_START_STANDARD_PROJECTIONS: "true"
      EVENTSTORE_INSECURE: "true"            # Set to false + add certs for production TLS
      EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
      EVENTSTORE_MEM_DB: "false"
    volumes:
      - esdb-data:/var/lib/eventstore
      - esdb-logs:/var/log/eventstore
    ports:
      - "127.0.0.1:2113:2113"   # HTTP API / UI (localhost only)
      - "127.0.0.1:1113:1113"   # TCP client
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2113/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - trading-net

  # ---------------------------------------------------------------------------
  # Go Trading Server
  # ---------------------------------------------------------------------------
  trading-server:
    build:
      context: ./trading-server
      dockerfile: Dockerfile
    <<: *restart-policy
    container_name: trading-server
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}?sslmode=disable
      EVENTSTORE_URL: esdb://eventstoredb:2113?tls=false
      SERVER_PORT: "8080"
    ports:
      - "0.0.0.0:8080:8080"     # Exposed to internet (firewall-controlled)
    depends_on:
      postgres:
        condition: service_healthy
      eventstoredb:
        condition: service_healthy
    networks:
      - trading-net

  # ---------------------------------------------------------------------------
  # Python Trading Bots
  # ---------------------------------------------------------------------------
  # Each bot is a separate service so Docker handles restarts independently.
  # Duplicate this block for each bot, or use `docker compose up --scale bot-1=3`
  # ---------------------------------------------------------------------------
  bot-1:
    build:
      context: ./bots
      dockerfile: Dockerfile
    <<: *restart-policy
    container_name: trading-bot-1
    environment:
      BOT_NAME: "bot-1"
      TRADING_SERVER_URL: http://trading-server:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}?sslmode=disable
      # Add your exchange API keys here or mount a secrets file
      # EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      # EXCHANGE_API_SECRET: ${EXCHANGE_API_SECRET}
    volumes:
      - bot-logs:/app/logs
    depends_on:
      trading-server:
        condition: service_started
    networks:
      - trading-net

  bot-2:
    build:
      context: ./bots
      dockerfile: Dockerfile
    <<: *restart-policy
    container_name: trading-bot-2
    environment:
      BOT_NAME: "bot-2"
      TRADING_SERVER_URL: http://trading-server:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}?sslmode=disable
    volumes:
      - bot-logs:/app/logs
    depends_on:
      trading-server:
        condition: service_started
    networks:
      - trading-net

volumes:
  pgdata:
    driver: local
  esdb-data:
    driver: local
  esdb-logs:
    driver: local
  bot-logs:
    driver: local

networks:
  trading-net:
    driver: bridge

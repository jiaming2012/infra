# =============================================================================
# PostgreSQL 16 — Tuned for CX22 (4 GB RAM) + WAL archiving
# =============================================================================

# --- Connection ---
listen_addresses = '*'
max_connections = 50

# --- Memory (tuned for 4GB RAM shared with other services) ---
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 8MB
maintenance_work_mem = 128MB

# --- WAL & Archiving ---
wal_level = replica
archive_mode = on
archive_command = '/usr/local/bin/wal-archive.sh %p %f'
archive_timeout = 300            # Force archive every 5 min even with low activity
max_wal_size = 1GB
min_wal_size = 256MB

# --- Checkpoints ---
checkpoint_completion_target = 0.9

# --- Logging ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_min_duration_statement = 500   # Log queries taking > 500ms
log_checkpoints = on
log_connections = on
log_disconnections = on

# --- Performance ---
random_page_cost = 1.1             # SSD storage
effective_io_concurrency = 200

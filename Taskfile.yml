version: '3'

vars:
  TRADING_COMPOSE: ./docker/docker-compose.yml
  YUMYUMS_COMPOSE: ./docker/yumyums/docker-compose.yml

tasks:
  up:
    desc: Start all services (trading + yumyums)
    cmds:
      - docker compose -f {{.TRADING_COMPOSE}} up -d
      - docker compose -f {{.YUMYUMS_COMPOSE}} up -d

  down:
    desc: Stop all services (data persists)
    cmds:
      - docker compose -f {{.TRADING_COMPOSE}} down
      - docker compose -f {{.YUMYUMS_COMPOSE}} down

  ps:
    desc: Show running services
    cmds:
      - docker compose -f {{.TRADING_COMPOSE}} ps
      - docker compose -f {{.YUMYUMS_COMPOSE}} ps

  # ---------------------------------------------------------------------------
  # Yumyums
  # ---------------------------------------------------------------------------
  yumyums:up:
    desc: Start yumyums Postgres
    cmd: docker compose -f {{.YUMYUMS_COMPOSE}} up -d

  yumyums:down:
    desc: Stop yumyums Postgres
    cmd: docker compose -f {{.YUMYUMS_COMPOSE}} down

  yumyums:logs:
    desc: Tail yumyums Postgres logs
    cmd: docker compose -f {{.YUMYUMS_COMPOSE}} logs -f

  yumyums:reset:
    desc: Wipe yumyums data and restart
    cmds:
      - docker compose -f {{.YUMYUMS_COMPOSE}} down -v
      - task: yumyums:up

  # ---------------------------------------------------------------------------
  # Trading
  # ---------------------------------------------------------------------------
  trading:up:
    desc: Start trading stack (postgres, eventstore, server, bots)
    cmd: docker compose -f {{.TRADING_COMPOSE}} up -d

  trading:down:
    desc: Stop trading stack
    cmd: docker compose -f {{.TRADING_COMPOSE}} down

  trading:logs:
    desc: Tail trading stack logs
    cmd: docker compose -f {{.TRADING_COMPOSE}} logs -f

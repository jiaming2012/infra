apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-tcp-microk8s-conf
  namespace: ingress
data:
  5432: "data/postgres:5432"
  2113: "eventstoredb/eventstoredb:2113"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-ingress-microk8s-controller
  namespace: ingress
spec:
  template:
    spec:
      containers:
      - name: nginx-ingress-microk8s
        ports:
        - name: proxied-tcp-5432
          containerPort: 5432
          hostPort: 5432
          protocol: TCP
        - name: proxied-tcp-2113
          containerPort: 2113
          hostPort: 2113
          protocol: TCP
